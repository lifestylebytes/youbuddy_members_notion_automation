name: Scheduled Dashboard Refresh

on:
  schedule:
    # 00:05 KST every day
    - cron: "5 15 * * *"
  workflow_dispatch:

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret
        env:
          RESYNC_SECRET: ${{ secrets.RESYNC_SECRET }}
        run: |
          if [ -z "$RESYNC_SECRET" ]; then
            echo "Missing RESYNC_SECRET GitHub secret"
            exit 1
          fi

      - name: Trigger remote dashboard refresh
        env:
          RESYNC_SECRET: ${{ secrets.RESYNC_SECRET }}
        run: |
          curl --fail --show-error --silent \
            "https://youbuddy-members-notion-automation.vercel.app/refresh-dashboard?secret=$RESYNC_SECRET"
